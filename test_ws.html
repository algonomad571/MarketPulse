<!DOCTYPE html>
<html>
<body>
<h2>WebSocket Test</h2>

<script>
const ws = new WebSocket("ws://localhost:8081/ws/metrics");

ws.onopen = () => console.log("Connected");

ws.onmessage = (e) => {
  console.log("DATA:", JSON.parse(e.data));
};

ws.onerror = (e) => console.error("Error:", e);
ws.onclose = () => console.log("Closed");
</script>

</body>
</html>
