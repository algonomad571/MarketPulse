services:
  core:
    container_name: core
    build:
      context: .
      dockerfile: Dockerfile.core
      network: host
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 8.8.4.4
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - core-data:/app/data
      - ./config.json:/app/config.json:ro
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/metrics"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    hostname: core
    networks:
      - marketpulse-net

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://core:8080
      - NEXT_PUBLIC_WS_URL=ws://core:8081/ws/metrics
    depends_on:
      core:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - marketpulse-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.docker.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--log.level=debug'
    depends_on:
      core:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - marketpulse-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/datasources/prometheus.docker.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped
    networks:
      - marketpulse-net

volumes:
  core-data:
  prometheus-data:
  grafana-data:

networks:
  marketpulse-net:
    driver: bridge
    driver_opts:
      com.docker.driver.mtu: 1500
    ipam:
      config:
        - subnet: 172.20.0.0/16